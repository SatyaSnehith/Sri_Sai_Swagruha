
{% extends "layout.html" %}
{% block content %}
<h2>Your Cart</h2>

<table>
<tr><th>Item</th><th>Qty</th><th>Total</th><th>Action</th></tr>
{% for item in cart %}
<tr>
<td>{{ item.item }}</td>
<td>{{ item.qty }}</td>
<td>₹{{ item.qty * 399 }}</td>
<td><a href="/delete/{{ loop.index0 }}">Delete</a></td>
</tr>
{% endfor %}
</table>

<h3>Grand Total: ₹{{ total }}</h3>
<h3>20% Advance Payment: ₹{{ advance }}</h3>

<div class="buttons">
<a href="/menu" class="btn">Continue Shopping</a>
<a href="/booking" class="btn primary">Proceed to Booking</a>
</div>

{% endblock %}
